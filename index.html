    const stageFlow=f.stage_dist.map((s,i)=>{
      const hasCount=s.count>0;
      const chip=`<div class="stage-chip${hasCount?' has-count':''}"><div class="sc-name">${s.stage}</div><div class="sc-count">${s.count}</div></div>`;
      return(i>0?'<span class="stage-arrow">›</span>':'')+chip;
    }).join('');
    const allAg=new Set([...f.agents.map(a=>a.name),...Object.keys(fpAg)]);
    const ags=[...allAg].sort().map(name=>{
      const ap=fpAg[name]||{leads:0,evol:0,avancos:0,retrocessos:0,won:0,lost:0};
      const mv=ap.leads+ap.avancos+ap.retrocessos+ap.won+ap.lost;
      const inCart=f.agents.some(a=>a.name===name&&a.in_carteira);
      if(!mv&&!inCart)return '';
      if(!mv)return`<div class="agent off"><div class="ah"><div class="aname"><span class="dot"></span>${name}</div><div class="amoves">—</div></div><div class="ab"><div class="nomov">Sem atividade no período</div></div></div>`;
      const rows=[
        ap.leads>0?`<div class="sr"><span class="sn">&#10010; Leads novos</span><span class="sc pos">${ap.leads}</span></div>`:'',
        ap.avancos>0?`<div class="sr"><span class="sn">&#8593; Avanços</span><span class="sc pos">${ap.avancos}</span></div>`:'',
        ap.retrocessos>0?`<div class="sr"><span class="sn">&#8595; Retrocessos</span><span class="sc neg">${ap.retrocessos}</span></div>`:'',
        ap.won>0?`<div class="sr"><span class="sn">&#127942; Ganhos</span><span class="sc pos">${ap.won}</span></div>`:'',
        ap.lost>0?`<div class="sr"><span class="sn">&#10060; Declinados</span><span class="sc">${ap.lost}</span></div>`:'',
      ].filter(Boolean).join('');
      return`<div class="agent on"><div class="ah"><div class="aname"><span class="dot"></span>${name}</div><div class="amoves">${mv} mov.</div></div><div class="ab">${rows}</div></div>`;
    }).filter(Boolean).join('');
    const wonBadge=fp.won>0?`<div class="fstat"><div class="n" style="color:#86efac">${fp.won}</div><div class="l">Ganhos</div></div>`:'';
    const totalOpen=f.stage_dist.reduce((s,x)=>s+x.count,0);
    const funnelAlerts=(f.parados.length||f.sem_responsavel.length)?
      `<div class="funnel-alerts">${f.parados.length?`<span>&#9888;&#65039; ${f.parados.length} parado(s) &gt;7 dias</span>`:''}${f.sem_responsavel.length?`<span>&#9888;&#65039; ${f.sem_responsavel.length} sem responsável</span>`:''}</div>`:'';
    return`<div class="funnel">
      <div class="fh">
        <h2>&#128193; ${f.name}</h2>
        <div class="fstats">
          <div class="fstat"><div class="n">${totalOpen}</div><div class="l">Total aberto</div></div>
          <div class="fstat"><div class="n" style="color:#93c5fd">${fp.leads}</div><div class="l">Leads período</div></div>
          <div class="fstat"><div class="n" style="color:#5eead4">${fp.avancos}</div><div class="l">Avanços</div></div>
          <div class="fstat"><div class="n" style="color:#fdba74">${fp.retrocessos}</div><div class="l">Retroc.</div></div>
          ${wonBadge}
        </div>
      </div>
      ${funnelAlerts}
      <div class="stage-pipeline">
        <div class="sp-label">Distribuição atual por etapa</div>
        <div class="stage-flow">${stageFlow}</div>
      </div>
      <div class="activity-header">
        <span class="ah-label">Atividade do comercial</span>
        <span class="ah-period">${pLabel()}</span>
      </div>
      <div class="agents">${ags||'<p style="padding:4px 0 12px;color:#94a3b8;font-style:italic;font-size:13px">Sem atividade no período.</p>'}</div>
    </div>`;
  }).join('');
}
render();
</script>
</body>
</html>
