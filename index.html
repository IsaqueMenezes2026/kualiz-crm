<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel CRM — Kualiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
.header{background:#0f172a;color:#fff;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:20px;font-weight:700}
.header .tag{font-size:11px;background:#1e3a5f;color:#93c5fd;padding:3px 8px;border-radius:20px;margin-bottom:6px;display:inline-block}
.meta{text-align:right;font-size:13px;color:#94a3b8}
.meta .date{font-size:15px;color:#e2e8f0;font-weight:600;margin-bottom:2px}
.filter-bar{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 32px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar .flbl{font-size:11px;color:#94a3b8;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.fbtn{border:1.5px solid #e2e8f0;background:#fff;color:#475569;border-radius:20px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:#3b82f6;color:#2563eb;background:#eff6ff}
.fbtn.active{background:#0f172a;border-color:#0f172a;color:#fff}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:24px 32px 0}
@media(max-width:700px){.summary{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-top:4px solid transparent}
.card.blue{border-color:#3b82f6}.card.purple{border-color:#8b5cf6}.card.green{border-color:#22c55e}.card.red{border-color:#ef4444}
.card .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#64748b;margin-bottom:8px}
.card .val{font-size:36px;font-weight:800;line-height:1;color:#0f172a}
.card .sub{font-size:12px;color:#94a3b8;margin-top:6px}
.funnels{padding:24px 32px 48px}
.funnel{background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:28px;overflow:hidden}
/* cabeçalho do funil */
.fh{background:#1e293b;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.fh h2{font-size:15px;font-weight:700;letter-spacing:.4px}
.fstats{display:flex;gap:20px;align-items:center}
.fstat{text-align:center}
.fstat .n{font-size:20px;font-weight:800;color:#fff;line-height:1}
.fstat .l{font-size:10px;color:#94a3b8;margin-top:2px;text-transform:uppercase;letter-spacing:.4px}
/* pipeline de etapas */
.stage-pipeline{padding:16px 24px;background:#f8fafc;border-bottom:1px solid #e2e8f0;overflow-x:auto}
.stage-pipeline .sp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8;margin-bottom:10px}
.stage-flow{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.stage-chip{display:flex;flex-direction:column;align-items:center;background:#fff;border:1.5px solid #e2e8f0;border-radius:8px;padding:6px 12px;min-width:80px;cursor:default;transition:border-color .15s}
.stage-chip:hover{border-color:#3b82f6}
.stage-chip .sc-name{font-size:10px;color:#64748b;font-weight:600;text-align:center;line-height:1.2;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.stage-chip .sc-count{font-size:20px;font-weight:800;color:#0f172a;line-height:1}
.stage-chip.has-count{border-color:#3b82f6;background:#eff6ff}
.stage-chip.has-count .sc-count{color:#1d4ed8}
.stage-arrow{color:#cbd5e1;font-size:16px;flex-shrink:0}
/* seção de atividade do comercial */
.activity-header{padding:12px 24px 4px;display:flex;align-items:center;gap:8px}
.activity-header .ah-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#94a3b8}
.activity-header .ah-period{font-size:11px;color:#3b82f6;font-weight:600;background:#eff6ff;border-radius:10px;padding:2px 8px}
.agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;padding:8px 20px 20px}
.agent{border-radius:10px;border:1.5px solid;overflow:hidden}
.agent.on{border-color:#22c55e}.agent.off{border-color:#e2e8f0}
.ah{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.agent.on .ah{background:#f0fdf4}.agent.off .ah{background:#f8fafc}
.aname{font-weight:700;font-size:13px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent.on .dot{background:#22c55e}.agent.off .dot{background:#cbd5e1}
.amoves{font-size:20px;font-weight:800}
.agent.on .amoves{color:#16a34a}.agent.off .amoves{color:#cbd5e1}
.ab{padding:8px 16px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
.sr:last-child{border:none}
.sn{color:#475569}
.sc{font-weight:700;background:#f1f5f9;border-radius:20px;padding:2px 8px;font-size:11px;min-width:24px;text-align:center}
.sc.pos{background:#dcfce7;color:#16a34a}
.nomov{color:#94a3b8;font-size:12px;font-style:italic;padding:4px 0}
footer{text-align:center;padding:20px;color:#94a3b8;font-size:12px}
</style>
</head>
<body>
<div class="header">
  <div>
    <span class="tag">KUALIZ · COMERCIAL</span>
    <h1>&#128202; Painel de Acompanhamento CRM</h1>
  </div>
  <div class="meta">
    <div class="date" id="prange"></div>
    <div>Gerado em <span id="gt"></span></div>
  </div>
</div>
<div class="filter-bar">
  <span class="flbl">Per&#237;odo:</span>
  <button class="fbtn active" data-p="hoje">Hoje</button>
  <button class="fbtn" data-p="dia_anterior">Dia Anterior</button>
  <button class="fbtn" data-p="semana_atual">Semana Atual</button>
  <button class="fbtn" data-p="semana_anterior">Semana Anterior</button>
  <button class="fbtn" data-p="mes_atual">M&#234;s Atual</button>
  <button class="fbtn" data-p="mes_anterior">M&#234;s Anterior</button>
  <button class="fbtn" data-p="ultimos_30">&#218;ltimos 30 dias</button>
</div>
<div class="summary" id="sum"></div>
<div class="funnels" id="fun"></div>
<footer id="ft"></footer>
<script>

"name": "João Pedro", "in_carteira": true}, {"name": "Marcus Vinicius", "in_carteira": true}, {"name": "Tiago Menezes", "in_carteira": true}]}], "periods": {"hoje": {"leads": 8, "evol": 0, "won": 0, "lost": 0, "funnels": {"FUNIL COMERCIAL": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "agents": {}}, "KUALIZ COMERCIAL": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "agents": {}}, "KLINGO COMERCIAL": {"leads": 1, "evol": 0, "won": 0, "lost": 0, "agents": {"Marcus Vinicius": {"leads": 1, "evol": 0, "won": 0, "lost": 0}}}, "KURE - OFICIAL": {"leads": 7, "evol": 0, "won": 0, "lost": 0, "agents": {"Marcus Vinicius": {"leads": 5, "evol": 0, "won": 0, "lost": 0}, "João Pedro": {"leads": 2, "evol": 0, "won": 0, "lost": 0}}}}, "label": "Hoje", "date_range": "Análise: 13/06/2026"}, "dia_anterior": {"leads": 14, "evol": 6, "won": 0, "lost": 0, "funnels": {"FUNIL COMERCIAL": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "agents": {}}, "KUALIZ COMERCIAL": {"leads": 4, "evol": 6, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 1, "evol": 1, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 3, "evol": 5, "won": 0, "lost": 0}}}, "KLINGO COMERCIAL": {"leads": 1, "evol": 0, "won": 0, "lost": 0, "agents": {"Marcus Vinicius": {"leads": 1, "evol": 0, "won": 0, "lost": 0}}}, "KURE - OFICIAL": {"leads": 9, "evol": 0, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 4, "evol": 0, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 5, "evol": 0, "won": 0, "lost": 0}}}}, "label": "Dia Anterior", "date_range": "Análise: 12/06/2026"}, "semana_atual": {"leads": 36, "evol": 13, "won": 0, "lost": 0, "funnels": {"FUNIL COMERCIAL": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "agents": {}}, "KUALIZ COMERCIAL": {"leads": 9, "evol": 8, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 3, "evol": 2, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 6, "evol": 6, "won": 0, "lost": 0}}}, "KLINGO COMERCIAL": {"leads": 4, "evol": 5, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 1, "evol": 4, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 3, "evol": 1, "won": 0, "lost": 0}}}, "KURE - OFICIAL": {"leads": 23, "evol": 0, "won": 0, "lost": 0, "agents": {"Tiago Menezes": {"leads": 3, "evol": 0, "won": 0, "lost": 0}, "João Pedro": {"leads": 9, "evol": 0, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 11, "evol": 0, "won": 0, "lost": 0}}}}, "label": "Semana Atual", "date_range": "08/06 – 13/06/2026"}, "semana_anterior": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "funnels": {}, "label": "Semana Anterior", "date_range": "01/06 – 07/06/2026"}, "mes_atual": {"leads": 36, "evol": 13, "won": 0, "lost": 0, "funnels": {"FUNIL COMERCIAL": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "agents": {}}, "KUALIZ COMERCIAL": {"leads": 9, "evol": 8, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 3, "evol": 2, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 6, "evol": 6, "won": 0, "lost": 0}}}, "KLINGO COMERCIAL": {"leads": 4, "evol": 5, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 1, "evol": 4, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 3, "evol": 1, "won": 0, "lost": 0}}}, "KURE - OFICIAL": {"leads": 23, "evol": 0, "won": 0, "lost": 0, "agents": {"Tiago Menezes": {"leads": 3, "evol": 0, "won": 0, "lost": 0}, "João Pedro": {"leads": 9, "evol": 0, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 11, "evol": 0, "won": 0, "lost": 0}}}}, "label": "Mês Atual", "date_range": "01/06 – 13/06/2026"}, "mes_anterior": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "funnels": {}, "label": "Mês Anterior", "date_range": "01/05 – 31/05/2026"}, "ultimos_30": {"leads": 36, "evol": 13, "won": 0, "lost": 0, "funnels": {"FUNIL COMERCIAL": {"leads": 0, "evol": 0, "won": 0, "lost": 0, "agents": {}}, "KUALIZ COMERCIAL": {"leads": 9, "evol": 8, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 3, "evol": 2, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 6, "evol": 6, "won": 0, "lost": 0}}}, "KLINGO COMERCIAL": {"leads": 4, "evol": 5, "won": 0, "lost": 0, "agents": {"João Pedro": {"leads": 1, "evol": 4, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 3, "evol": 1, "won": 0, "lost": 0}}}, "KURE - OFICIAL": {"leads": 23, "evol": 0, "won": 0, "lost": 0, "agents": {"Tiago Menezes": {"leads": 3, "evol": 0, "won": 0, "lost": 0}, "João Pedro": {"leads": 9, "evol": 0, "won": 0, "lost": 0}, "Marcus Vinicius": {"leads": 11, "evol": 0, "won": 0, "lost": 0}}}}, "label": "Últimos 30 dias", "date_range": "15/05 – 13/06/2026"}}};
let CP='hoje';
document.getElementById('gt').textContent=D.generated_at;
document.getElementById('ft').textContent='Gerado automaticamente em '+D.generated_at+' · Kualiz CRM';
document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{
  CP=b.dataset.p;
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  render();
}));
function pLabel(){
  const b=document.querySelector('.fbtn.active');
  return b?b.textContent.trim():'';
}
function render(){
  const p=D.periods[CP]||{leads:0,evol:0,won:0,lost:0,date_range:'—',funnels:{}};
  document.getElementById('prange').textContent=p.date_range;
  // Cards de resumo
  document.getElementById('sum').innerHTML=[
    {l:'Leads Novos',v:p.leads,s:'entraram no funil no período',c:'blue'},
    {l:'Evoluções',v:p.evol,s:'movimentações no funil',c:'purple'},
    {l:'Ganhos',v:p.won,s:'fechamentos no período',c:'green'},
    {l:'Declinados',v:p.lost,s:'perdas no período',c:'red'},
  ].map(c=>`<div class="card ${c.c}"><div class="lbl">${c.l}</div><div class="val">${c.v}</div><div class="sub">${c.s}</div></div>`).join('');
  // Funis
  document.getElementById('fun').innerHTML=D.funnels.map(f=>{
    const fp=(p.funnels&&p.funnels[f.name])||{leads:0,evol:0,won:0,lost:0,agents:{}};
    const fpAg=fp.agents||{};
    // Pipeline de etapas (estático — não muda com período)
    const stageFlow=f.stage_dist.map((s,i)=>{
      const hasCount=s.count>0;
      const chip=`<div class="stage-chip${hasCount?' has-count':''}"><div class="sc-name">${s.stage}</div><div class="sc-count">${s.count}</div></div>`;
      return(i>0?'<span class="stage-arrow">›</span>':'')+chip;
    }).join('');
    // Atividade por agente (dinâmica — muda com período)
    const allAg=new Set([...f.agents.map(a=>a.name),...Object.keys(fpAg)]);
    const ags=[...allAg].sort().map(name=>{
      const ap=fpAg[name]||{leads:0,evol:0,won:0,lost:0};
      const mv=ap.leads+ap.evol+ap.won+ap.lost;
      const inCart=f.agents.some(a=>a.name===name&&a.in_carteira);
      if(!mv&&!inCart)return '';
      if(!mv)return`<div class="agent off"><div class="ah"><div class="aname"><span class="dot"></span>${name}</div><div class="amoves">—</div></div><div class="ab"><div class="nomov">Sem atividade no período</div></div></div>`;
      const rows=[
        ap.leads>0?`<div class="sr"><span class="sn">&#10010; Leads novos</span><span class="sc pos">${ap.leads}</span></div>`:'',
        ap.evol>0?`<div class="sr"><span class="sn">&#8593; Evoluções</span><span class="sc pos">${ap.evol}</span></div>`:'',
        ap.won>0?`<div class="sr"><span class="sn">&#127942; Ganhos</span><span class="sc pos">${ap.won}</span></div>`:'',
        ap.lost>0?`<div class="sr"><span class="sn">&#10060; Declinados</span><span class="sc">${ap.lost}</span></div>`:'',
      ].filter(Boolean).join('');
      return`<div class="agent on"><div class="ah"><div class="aname"><span class="dot"></span>${name}</div><div class="amoves">${mv} mov.</div></div><div class="ab">${rows}</div></div>`;
    }).filter(Boolean).join('');
    const wonBadge=fp.won>0?`<div class="fstat"><div class="n" style="color:#86efac">${fp.won}</div><div class="l">Ganhos</div></div>`:'';
    const totalOpen=f.stage_dist.reduce((s,x)=>s+x.count,0);
    return`<div class="funnel">
      <div class="fh">
        <h2>&#128193; ${f.name}</h2>
        <div class="fstats">
          <div class="fstat"><div class="n">${totalOpen}</div><div class="l">Total aberto</div></div>
          <div class="fstat"><div class="n" style="color:#93c5fd">${fp.leads}</div><div class="l">Leads período</div></div>
          <div class="fstat"><div class="n" style="color:#c4b5fd">${fp.evol}</div><div class="l">Evoluções</div></div>
          ${wonBadge}
        </div>
      </div>
      <div class="stage-pipeline">
        <div class="sp-label">Distribuição atual por etapa</div>
        <div class="stage-flow">${stageFlow}</div>
      </div>
      <div class="activity-header">
        <span class="ah-label">Atividade do comercial</span>
        <span class="ah-period">${pLabel()}</span>
      </div>
      <div class="agents">${ags||'<p style="padding:4px 0 12px;color:#94a3b8;font-style:italic;font-size:13px">Sem atividade no período.</p>'}</div>
    </div>`;
  }).join('');
}
render();
</script>
</body>
